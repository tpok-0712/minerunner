<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Mind Runner: Cyber Sweeper Pro</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #050505; color: #eee; margin: 0; padding: 20px; overflow-x: hidden; }
        #game-container { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        canvas { border: 2px solid #00f2ff; background: #080808; box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); cursor: pointer; border-radius: 4px; }
        .controls { background: #111; padding: 20px; border-radius: 12px; width: 620px; text-align: left; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 1.1em; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .ap-container { display: flex; align-items: center; gap: 5px; }
        .ap-pip { display: inline-block; width: 14px; height: 14px; background: #222; border-radius: 50%; border: 1px solid #444; }
        .ap-pip.active { background: #ffeb3b; box-shadow: 0 0 10px #ffeb3b; border-color: #fff; }
        .ap-pip.saved { background: #ff9800; box-shadow: 0 0 10px #ff9800; border-color: #fff; }
        .detector { color: #00ff00; font-weight: bold; background: #0a200a; padding: 4px 12px; border-radius: 20px; border: 1px solid #00ff00; text-shadow: 0 0 8px #00ff00; }
        .button-group { display: flex; gap: 8px; flex-wrap: wrap; }
        button { background: #222; color: #eee; border: 1px solid #444; padding: 10px 18px; cursor: pointer; font-family: inherit; border-radius: 6px; transition: all 0.2s; font-weight: 600; }
        button:hover { background: #333; border-color: #666; transform: translateY(-1px); }
        button.active { background: #00f2ff; color: #000; border-color: #fff; box-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }
        button.skill { border-color: #ff00ff; color: #ff00ff; }
        button.skill:not(:disabled):hover { background: rgba(255, 0, 255, 0.2); box-shadow: 0 0 10px rgba(255, 0, 255, 0.3); }
        button.skill.active-skill { background: #ff00ff; color: #fff; animation: pulse 1.5s infinite; }
        button:disabled { opacity: 0.2; cursor: not-allowed; }
        #event-log { font-size: 0.9em; color: #888; margin-top: 15px; padding: 10px; background: #000; border-radius: 4px; height: 1.2em; line-height: 1.2em; border-left: 3px solid #444; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 255, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 0, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 255, 0); } }
    </style>
</head>
<body>
    <h1>MIND RUNNER: CYBER</h1>
    <div id="game-container">
        <canvas id="gameBoard" width="600" height="600"></canvas>
        <div class="controls">
            <div class="status-line">
                <span id="playerStatus" style="font-weight: bold; font-size: 1.3em;">Player 1</span>
                <div class="ap-container">AP: <div id="apPips"></div></div>
                <div class="detector">SCAN: <span id="mineCountDisplay">0</span></div>
            </div>
            <div class="button-group">
                <button id="moveBtn" onclick="setMode('move')">移動 (1AP)</button>
                <button id="mineBtn" onclick="setMode('mine')">地雷設置 (2AP)</button>
                <button id="disarmBtn" onclick="setMode('disarm')">解除 (1AP)</button>
                <button id="skillBtn" class="skill" onclick="activateSkill()">OVERCLOCK (3AP)</button>
                <button id="endTurnBtn" style="margin-left: auto; background: #444;" onclick="endTurn()">ターン終了</button>
            </div>
            <div id="event-log">System Ready...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileSize = canvas.width / gridSize;
        const log = document.getElementById('event-log');

        let state = {
            turn: 1, ap: 4, savedAp: { 1: 0, 2: 0 }, baseAp: 4, maxSave: 2,
            mode: 'move',
            p1: { x: 0, y: gridSize-1, color: '#00ffcc', startX: 0, startY: gridSize-1, goalX: gridSize-1, goalY: 0, ocTurns: 0 },
            p2: { x: gridSize-1, y: 0, color: '#ff0066', startX: gridSize-1, startY: 0, goalX: 0, goalY: gridSize-1, ocTurns: 0 },
            mines: [], obstacles: [], turnCount: 0, particles: []
        };

        // 障害物の生成
        for (let i = 0; i < gridSize; i++) {
            for (let j = 0; j < gridSize; j++) {
                if (Math.random() < 0.22) {
                    const isStartP1 = (i < 2 && j > gridSize-3);
                    const isStartP2 = (i > gridSize-3 && j < 2);
                    if (!isStartP1 && !isStartP2) state.obstacles.push({x: i, y: j});
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 背景グリッド描画
            ctx.strokeStyle = "#1a1a1a";
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridSize; i++) {
                ctx.beginPath(); ctx.moveTo(i * tileSize, 0); ctx.lineTo(i * tileSize, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * tileSize); ctx.lineTo(canvas.width, i * tileSize); ctx.stroke();
            }

            // 障害物描画
            state.obstacles.forEach(o => {
                ctx.fillStyle = "#151515";
                ctx.fillRect(o.x * tileSize + 2, o.y * tileSize + 2, tileSize - 4, tileSize - 4);
                ctx.strokeStyle = "#333";
                ctx.strokeRect(o.x * tileSize + 4, o.y * tileSize + 4, tileSize - 8, tileSize - 8);
            });

            // ゴールエリア
            drawGoal(state.p1.goalX, state.p1.goalY, state.p1.color);
            drawGoal(state.p2.goalX, state.p2.goalY, state.p2.color);
            
            // 地雷（設置した瞬間のみ表示）
            state.mines.forEach(m => {
                if (m.turnPlaced === state.turnCount && m.owner === state.turn) {
                    ctx.fillStyle = "rgba(255, 255, 255, 0.3)"; 
                    ctx.beginPath(); ctx.arc(m.x * tileSize + tileSize/2, m.y * tileSize + tileSize/2, tileSize/5, 0, Math.PI*2); ctx.fill();
                }
            });

            drawPlayer(state.p1);
            drawPlayer(state.p2);
            drawParticles();
            updateUI();
        }

        function drawPlayer(p) {
            ctx.fillStyle = p.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = p.color;
            ctx.fillRect(p.x * tileSize + 6, p.y * tileSize + 6, tileSize - 12, tileSize - 12);
            ctx.shadowBlur = 0;
            
            if (p.ocTurns > 0) {
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x * tileSize + 2, p.y * tileSize + 2, tileSize - 4, tileSize - 4);
                ctx.lineWidth = 1;
            }
        }

        function drawGoal(x, y, color) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
            ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
            ctx.strokeStyle = color;
            ctx.setLineDash([4, 2]);
            ctx.strokeRect(x * tileSize + 4, y * tileSize + 4, tileSize - 8, tileSize - 8);
            ctx.setLineDash([]);
        }

        function updateUI() {
            const cp = state[`p${state.turn}`];
            const pStatus = document.getElementById('playerStatus');
            pStatus.innerText = `PLAYER ${state.turn}`;
            pStatus.style.color = cp.color;
            
            const pips = document.getElementById('apPips');
            pips.innerHTML = '';
            for(let i=0; i < (state.baseAp + state.maxSave); i++) {
                const pip = document.createElement('div');
                pip.className = `ap-pip ${i < state.ap ? (i >= state.baseAp ? 'saved' : 'active') : ''}`;
                pips.appendChild(pip);
            }

            document.getElementById('mineCountDisplay').innerText = state.mines.filter(m => Math.abs(m.x - cp.x) + Math.abs(m.y - cp.y) <= 2).length;
            document.getElementById('moveBtn').className = state.mode === 'move' ? 'active' : '';
            document.getElementById('mineBtn').className = state.mode === 'mine' ? 'active' : '';
            document.getElementById('disarmBtn').className = state.mode === 'disarm' ? 'active' : '';
            
            const sBtn = document.getElementById('skillBtn');
            sBtn.disabled = (state.ap < 3 && cp.ocTurns === 0) || cp.ocTurns > 0;
            if (cp.ocTurns > 0) {
                sBtn.innerText = `OVERCLOCK ACTIVE (${cp.ocTurns})`;
                sBtn.classList.add('active-skill');
            } else {
                sBtn.innerText = "OVERCLOCK (3AP)";
                sBtn.classList.remove('active-skill');
            }
        }

        function setMode(m) { state.mode = m; draw(); }

        function activateSkill() {
            const cp = state[`p${state.turn}`];
            if (state.ap >= 3 && cp.ocTurns === 0) {
                state.ap -= 3;
                cp.ocTurns = 2; // 使用ターン(1) + 次のターン(1)
                addLog(`CRITICAL: Player ${state.turn} Overclocked!`);
                draw();
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const tx = Math.floor((e.clientX - rect.left) / tileSize);
            const ty = Math.floor((e.clientY - rect.top) / tileSize);
            const cp = state[`p${state.turn}`];
            const moveCost = cp.ocTurns > 0 ? 0.5 : 1;

            if (state.mode === 'move' && state.ap >= moveCost) {
                if (Math.abs(tx - cp.x) + Math.abs(ty - cp.y) === 1 && !state.obstacles.some(o => o.x === tx && o.y === ty)) {
                    cp.x = tx; cp.y = ty; state.ap -= moveCost;
                    if (checkCollision(tx, ty)) return;
                }
            } else if (state.mode === 'mine' && state.ap >= 2) {
                if (!state.obstacles.some(o => o.x === tx && o.y === ty)) {
                    state.mines.push({x: tx, y: ty, owner: state.turn, turnPlaced: state.turnCount});
                    state.ap -= 2;
                    addLog(`Mine deployed by P${state.turn}`);
                }
            } else if (state.mode === 'disarm' && state.ap >= 1) {
                const mineIdx = state.mines.findIndex(m => m.x === tx && m.y === ty);
                if (mineIdx !== -1) { state.mines.splice(mineIdx, 1); addLog("Signal Disrupted. Mine removed."); }
                else { addLog("No signal detected at location."); }
                state.ap -= 1;
            }
            draw();
            if (state.ap <= 0) endTurn();
        });

        function checkCollision(x, y) {
            const mineIndex = state.mines.findIndex(m => m.x === x && m.y === y);
            const cp = state[`p${state.turn}`];
            if (mineIndex !== -1) {
                addLog("!! DETONATION !!");
                createExplosionParticles(x, y, cp.color);
                cp.x = cp.startX; cp.y = cp.startY;
                cp.ocTurns = 0; // 自爆でOC強制終了
                state.mines.splice(mineIndex, 1);
                state.ap = 0; endTurn();
                return true;
            }
            if (x === cp.goalX && y === cp.goalY) {
                alert(`MISSION COMPLETE: Player ${state.turn} Wins!`);
                location.reload();
            }
            return false;
        }

        function createExplosionParticles(x, y, color) {
            for (let i = 0; i < 40; i++) {
                state.particles.push({
                    x: x * tileSize + tileSize/2, y: y * tileSize + tileSize/2,
                    vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12,
                    life: 40 + Math.random() * 20, color: color
                });
            }
        }

        function drawParticles() {
            if (state.particles.length === 0) return;
            state.particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life--;
                if (p.life <= 0) { state.particles.splice(i, 1); return; }
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 60;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1;
            requestAnimationFrame(draw);
        }

        function endTurn() {
            const cp = state[`p${state.turn}`];
            state.savedAp[state.turn] = Math.min(Math.floor(state.ap), state.maxSave);
            if (cp.ocTurns > 0) cp.ocTurns--;

            state.turn = state.turn === 1 ? 2 : 1;
            state.ap = state.baseAp + state.savedAp[state.turn];
            state.mode = 'move';
            state.turnCount++;
            addLog(`Player ${state.turn} - Systems Online.`);
            draw();
        }

        function addLog(msg) { log.innerText = msg; }
        draw();
    </script>
</body>
</html>
